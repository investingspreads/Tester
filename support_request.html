<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Support Request</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="./images/DWAH-logo.png" alt="DWAH-logo" class="logo-img">
                </a>
            </div>
        </nav>
    </header>

    <main class="main-container" alt="main-container">
        <section class="support-section">
            <div class="support-card">
                <h1>Submit a Support Request</h1>
                <form class="support-form" action="submit_support.php" method="POST" onsubmit="event.preventDefault(); alert('Form submission prevented while testing');">
                    <label for="email">Your Email:</label>
                    <input type="email" id="email" name="email" required>
    
                    <label for="description">Support Request Description:</label>
                    <textarea id="description" name="description" rows="8" required></textarea>
    
                    <button type="submit" class="cta-btn-support">Submit Request</button>
                </form>
            </div>
        </section>
        <div class="dashboard-actions">
            <button class="cta-btn" onclick="window.location.href='dashboard_leader.html'">Dashboard</button>
            <button class="cta-btn" onclick="window.location.href='proposal_submission.html'">Submit a Proposal</button>
            <button class="cta-btn" onclick="window.location.href='support_request.html'">Support Request</button>
            <button class="cta-btn" onclick="window.location.href='announcement_post.html'">Post an Announcement</button>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Dollars With A Heart | All Rights Reserved</p>
    </footer>
</body>
</html>
